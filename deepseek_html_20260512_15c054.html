<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>幸运美食大转盘 | 随机点菜单神器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #f9f3e6 0%, #ffefdb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'SF Pro Text', 'HarmonyOS Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            padding: 20px;
        }

        /* 主卡片容器 */
        .card {
            background: rgba(255, 248, 235, 0.92);
            backdrop-filter: blur(2px);
            border-radius: 72px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), 0 8px 18px rgba(0, 0, 0, 0.1);
            padding: 30px 35px 45px;
            transition: all 0.3s ease;
            max-width: 780px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 215, 170, 0.6);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e65c1e, #fcb43a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        h1::before {
            content: "🍜";
            font-size: 2rem;
            background: none;
            -webkit-background-clip: unset;
            color: #e65c1e;
        }
        h1::after {
            content: "✨";
            font-size: 2rem;
            background: none;
            -webkit-background-clip: unset;
            color: #fcb43a;
        }

        .sub {
            color: #c57f3c;
            font-weight: 500;
            margin-bottom: 25px;
            border-bottom: 2px dashed #ffcd94;
            display: inline-block;
            padding-bottom: 5px;
        }

        /* 转盘容器 & 指针 */
        .wheel-container {
            position: relative;
            display: flex;
            justify-content: center;
            margin: 10px 0 20px;
        }

        canvas {
            background: #fff6ea;
            border-radius: 50%;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.3), 0 0 0 10px #fff2e2, 0 0 0 14px #f0bc7c;
            transition: box-shadow 0.2s;
            width: 100%;
            max-width: 500px;
            height: auto;
            cursor: pointer;
        }

        /* 固定指针指示器 (炫彩三角) */
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 22px solid transparent;
            border-right: 22px solid transparent;
            border-top: 45px solid #ff4d4d;
            filter: drop-shadow(0 6px 8px rgba(0, 0, 0, 0.25));
            z-index: 10;
        }
        .pointer::after {
            content: "⭐";
            position: absolute;
            font-size: 24px;
            top: -52px;
            left: -12px;
            color: #ffdd77;
            filter: drop-shadow(0 2px 2px gold);
        }
        /* 装饰圆点 */
        .wheel-container::before {
            content: "";
            position: absolute;
            width: 24px;
            height: 24px;
            background: radial-gradient(circle, #ffcc66, #ffa047);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            box-shadow: 0 0 0 4px #ffffdd, 0 0 0 7px #dd8844;
            pointer-events: none;
        }

        /* 控制区域 */
        .control-panel {
            margin-top: 30px;
            background: #fff8f0;
            border-radius: 56px;
            padding: 20px 28px;
            box-shadow: inset 0 1px 3px #fff8, 0 8px 18px rgba(0, 0, 0, 0.05);
        }

        .name-input-area {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
            margin-bottom: 25px;
        }

        .input-group {
            flex: 3;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            color: #b45f2b;
            margin-bottom: 8px;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        textarea {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            font-family: 'Segoe UI', monospace;
            background: white;
            border: 2px solid #ffd9ae;
            border-radius: 34px;
            resize: vertical;
            outline: none;
            transition: all 0.2s;
            color: #3a2a1f;
            font-weight: 500;
        }

        textarea:focus {
            border-color: #ff9f4a;
            box-shadow: 0 0 0 3px rgba(255, 159, 74, 0.3);
        }

        .btn-group {
            flex: 1;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        button {
            background: #ffaa55;
            border: none;
            font-weight: bold;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            color: #482208;
            box-shadow: 0 4px 0 #b4621a;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #b4621a;
        }

        .btn-primary {
            background: linear-gradient(120deg, #ff7e2e, #ffb347);
            color: white;
            text-shadow: 0 1px 0 #a0460a;
            box-shadow: 0 5px 0 #b4510c;
            font-size: 1.3rem;
            padding: 12px 28px;
            letter-spacing: 1px;
        }

        .btn-secondary {
            background: #f5e7d3;
            color: #c1621a;
            box-shadow: 0 4px 0 #c1a27a;
        }

        .start-btn {
            width: 100%;
            margin-top: 10px;
            background: linear-gradient(135deg, #ff6347, #ff8c42);
            color: white;
            font-size: 1.7rem;
            padding: 14px 0;
            border-radius: 60px;
            letter-spacing: 3px;
            font-weight: 800;
            box-shadow: 0 12px 0 #a23d1a;
        }

        .start-btn:active {
            transform: translateY(4px);
            box-shadow: 0 6px 0 #a23d1a;
        }

        button:disabled {
            opacity: 0.65;
            transform: translateY(0);
            cursor: not-allowed;
            filter: grayscale(0.1);
        }

        .info-note {
            margin-top: 20px;
            color: #bd7a3a;
            font-size: 0.75rem;
            background: #f9efdf;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 30px;
        }

        @media (max-width: 580px) {
            .card {
                padding: 20px 18px 30px;
            }
            .btn-group {
                flex-direction: column;
                width: 100%;
            }
            .name-input-area {
                flex-direction: column;
            }
            button {
                width: 100%;
            }
            .pointer {
                border-left: 18px solid transparent;
                border-right: 18px solid transparent;
                border-top: 38px solid #ff4d4d;
                top: -16px;
            }
            .pointer::after {
                font-size: 18px;
                top: -44px;
                left: -9px;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <h1>幸运食刻·转转锅</h1>
    <div class="sub">🎡 今天吃什么呢？转出惊喜 🎡</div>

    <!-- 转盘区 -->
    <div class="wheel-container">
        <canvas id="wheelCanvas" width="550" height="550" style="width:100%; height:auto; max-width:550px; aspect-ratio:1/1"></canvas>
        <div class="pointer"></div>
    </div>

    <!-- 操作面板 -->
    <div class="control-panel">
        <div class="name-input-area">
            <div class="input-group">
                <label>📋 粘贴菜单 (用英文逗号 <code>,</code> 分隔) </label>
                <textarea id="menuInput" rows="2" placeholder="例如：🍕 披萨, 寿司 🍣, 火锅 🍲, 烤肉 🥩, 意面 🍝, 沙拉 🥗"></textarea>
            </div>
            <div class="btn-group">
                <button id="updateMenuBtn" class="btn-secondary">🔄 生成转盘</button>
            </div>
        </div>
        <button id="spinBtn" class="start-btn">✨ 开始转转 ✨</button>
        <div class="info-note">💡 最多支持12道菜 | 点击开始，转盘飞旋，好运自现！</div>
    </div>
</div>

<script>
    (function() {
        // ---------- DOM 元素 ----------
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const menuTextarea = document.getElementById('menuInput');
        const updateBtn = document.getElementById('updateMenuBtn');
        const spinBtn = document.getElementById('spinBtn');

        // ---------- 全局变量 ----------
        let menuItems = [];          // 存储菜品名字数组
        let segmentsCount = 0;      
        let colors = [];             // 动态扇区颜色
        let currentRotation = 0;    // 当前转盘旋转弧度 (累积偏移)
        let animFrameId = null;      // 动画id
        let spinningActive = false;  // 是否正在旋转
        let animationStartTime = 0;
        let animationDuration = 2000; // 2秒动画 (快速旋转+减速)
        let startRotationRad = 0;
        let targetRotationRad = 0;
        
        // 指针固定方向: 向上 ( -PI/2 即 270° )
        const POINTER_ANGLE = -Math.PI / 2;   // 正上方为0°起点, 坐标系中指向12点钟
        
        // 默认示例菜单 (活力感)
        const DEFAULT_MENU = ["宫保鸡丁", "水煮鱼🐟", "麻婆豆腐", "回锅肉", "酸菜鱼", "糖醋排骨", "麻辣香锅", "菠萝炒饭"];
        
        // ---------- 辅助函数: 解析输入框文本, 最多12项 ----------
        function parseMenuFromInput(inputStr) {
            let raw = inputStr.trim();
            if (raw === "") return [];
            // 按英文逗号分割, 兼容中英文逗号混用但优先英文, 并过滤空字符串
            let items = raw.split(',').map(item => item.trim()).filter(item => item !== "");
            // 限制最多12个, 避免转盘过于密集
            if (items.length > 12) {
                alert("🎯 最多支持12道菜品，已自动截取前12项！");
                items = items.slice(0, 12);
            }
            return items;
        }
        
        // 更新菜单并重绘 (重置转盘角度, 取消旋转)
        function updateMenuAndRedraw() {
            if (spinningActive) {
                cancelAnimation();
                spinningActive = false;
                if (animFrameId) cancelAnimationFrame(animFrameId);
                animFrameId = null;
            }
            const rawText = menuTextarea.value;
            let newMenu = parseMenuFromInput(rawText);
            if (newMenu.length === 0) {
                // 如果用户清空输入框, 使用示例菜单
                newMenu = [...DEFAULT_MENU];
                menuTextarea.value = DEFAULT_MENU.join(", ");
                alert("✨ 已加载默认美味菜单 ✨");
            }
            menuItems = newMenu;
            segmentsCount = menuItems.length;
            // 生成活力鲜艳的颜色 (高饱和度糖果色, 避免过暗)
            generateColors(segmentsCount);
            // 重置旋转偏移为0
            currentRotation = 0;
            drawWheel(currentRotation);
        }
        
        // 生成高逼格多彩色板 (区分明显, 年轻活力)
        function generateColors(count) {
            const preset = [
                "#FF6B6B", "#4ECDC4", "#FFE66D", "#FF9F4A", "#BF8F6F", "#9B5DE5",
                "#F15BB5", "#00BBF9", "#00F5D4", "#FEE440", "#FF66B5", "#6A4E9B"
            ];
            if (count <= preset.length) {
                colors = preset.slice(0, count);
            } else {
                // 极少情况超过12理论不会发生, 但是动态生成更丰富的颜色
                colors = [];
                for (let i = 0; i < count; i++) {
                    let hue = (i * 360 / count + 45) % 360;
                    colors.push(`hsl(${hue}, 75%, 62%)`);
                }
            }
        }
        
        // 绘制转盘核心 (根据当前弧度偏移)
        function drawWheel(radOffset) {
            if (!ctx || segmentsCount === 0) {
                // 没有菜品时绘制占位
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.font = "bold 18px 'Segoe UI'";
                ctx.fillStyle = "#c0542a";
                ctx.shadowBlur = 0;
                ctx.fillText("🍽️ 请先添加菜品", canvas.width/2-100, canvas.height/2);
                return;
            }
            
            const width = canvas.width;
            const height = canvas.height;
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = width * 0.44;   // 留白边缘装饰感
            const angleStep = (Math.PI * 2) / segmentsCount;
            
            ctx.clearRect(0, 0, width, height);
            
            // 绘制每个扇形
            for (let i = 0; i < segmentsCount; i++) {
                const start = i * angleStep + radOffset;
                const end = (i + 1) * angleStep + radOffset;
                // 绘制扇形区块
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, start, end);
                ctx.closePath();
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                ctx.save();
                ctx.shadowBlur = 0;
                ctx.strokeStyle = "rgba(255,245,210,0.9)";
                ctx.lineWidth = 2.5;
                ctx.stroke();
                
                // 绘制分割白线 (精致感)
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, start, start);
                ctx.lineTo(centerX, centerY);
                ctx.strokeStyle = "#FFF5CF";
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // 绘制文字 (不旋转，保持易读水平)
                const midAngle = start + angleStep / 2;
                const textRadius = radius * 0.68;   // 避免文字太靠边
                const x = centerX + Math.cos(midAngle) * textRadius;
                const y = centerY + Math.sin(midAngle) * textRadius;
                
                let text = menuItems[i];
                // 简短截断适应长度
                if (text.length > 12) text = text.slice(0, 10) + "..";
                ctx.font = `500 ${Math.max(14, Math.min(18, 180 / segmentsCount))}px "Segoe UI", "PingFang SC", system-ui`;
                ctx.fillStyle = "#2D2418";
                ctx.shadowBlur = 0;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                // 描边文字更清晰
                ctx.fillStyle = "#FFF9F0";
                ctx.shadowBlur = 0;
                ctx.fillText(text, x+1, y+1);
                ctx.fillStyle = "#3E2A1F";
                ctx.fillText(text, x, y);
            }
            
            // 绘制中心小圆装饰 (精致)
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.12, 0, 2 * Math.PI);
            ctx.fillStyle = "#FFF7E8";
            ctx.shadowBlur = 6;
            ctx.fill();
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius * 0.08, 0, 2 * Math.PI);
            ctx.fillStyle = "#F0A45A";
            ctx.fill();
            ctx.shadowBlur = 0;
        }
        
        // 根据当前偏移量，计算指针所指的菜品索引 (固定指针方向)
        function getCurrentSelectedIndex(radOffset) {
            if (segmentsCount === 0) return -1;
            const angleStep = (Math.PI * 2) / segmentsCount;
            // 指针方向相对于世界坐标系角度 pointerWorld = POINTER_ANGLE
            // 转盘每个扇区的原始边界 (起始边界基于未旋转时从0开始)
            // 偏移旋转后，真实边界 = 原始起始 + radOffset , 原始结束+radOffset
            // 判断指针角度落在哪个扇区：即 pointerAngle ∈ [start+offset, end+offset)
            // 等价于 (pointerAngle - radOffset) 落在原始扇区范围
            let rawPointer = POINTER_ANGLE - radOffset;
            // 规范化到 [0, 2PI)
            let normRaw = ((rawPointer % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
            for (let i = 0; i < segmentsCount; i++) {
                let start = i * angleStep;
                let end = (i + 1) * angleStep;
                if (normRaw >= start && normRaw < end) {
                    return i;
                }
            }
            // fallback
            return 0;
        }
        
        // 根据目标菜品索引，计算出转盘最终偏移量 (让指针正中该扇区中央, 提高精准度)
        function calcRotationForTargetIndex(targetIdx, currentOffsetRad) {
            if (segmentsCount === 0) return 0;
            const angleStep = (Math.PI * 2) / segmentsCount;
            // 目标扇区的中央原始角度 (默认未旋转时)
            const targetSectorMidRaw = targetIdx * angleStep + angleStep / 2;
            // 我们希望指针方向 POINTER_ANGLE 指向这个扇区中央, 即满足: POINTER_ANGLE - targetRotation = targetSectorMidRaw (mod 2pi)
            // 所以 idealRotation = POINTER_ANGLE - targetSectorMidRaw (模2pi)
            let idealRotation = POINTER_ANGLE - targetSectorMidRaw;
            idealRotation = ((idealRotation % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
            return idealRotation;
        }
        
        // 动画缓动 easeOutCubic: 减速效果
        function easeOutCubic(t) {
            return 1 - Math.pow(1 - t, 3);
        }
        
        // 取消当前动画, 恢复按钮状态
        function cancelAnimation() {
            if (animFrameId) {
                cancelAnimationFrame(animFrameId);
                animFrameId = null;
            }
            spinningActive = false;
            spinBtn.disabled = false;
        }
        
        // 执行转盘旋转动画
        function startSpinAnimation(targetFinalRotationRad, startRotRad) {
            if (spinningActive) return;
            spinningActive = true;
            spinBtn.disabled = true;   // 旋转时禁用开始按钮
            
            animationStartTime = performance.now();
            const deltaRotation = targetFinalRotationRad - startRotRad;
            
            function step(now) {
                const elapsed = now - animationStartTime;
                let progress = Math.min(1, elapsed / animationDuration);
                const easeProgress = easeOutCubic(progress);
                const newRotation = startRotRad + deltaRotation * easeProgress;
                currentRotation = newRotation;
                drawWheel(currentRotation);
                
                if (progress < 1) {
                    animFrameId = requestAnimationFrame(step);
                } else {
                    // 动画结束，精准停在目标旋转弧度 (避免浮点误差)
                    currentRotation = targetFinalRotationRad;
                    drawWheel(currentRotation);
                    // 获取最终选中的菜品索引
                    const finalIdx = getCurrentSelectedIndex(currentRotation);
                    let prizeName = "未知名菜";
                    if (finalIdx !== -1 && menuItems[finalIdx]) {
                        prizeName = menuItems[finalIdx];
                    } else if (menuItems.length > 0) {
                        prizeName = menuItems[0];
                    }
                    // 弹出恭喜框
                    alert(`🎉 恭喜中奖！ 🎉\n\n今日天选美食： 「 ${prizeName} 」\n\n✨ 祝您用餐愉快 ✨`);
                    spinningActive = false;
                    spinBtn.disabled = false;
                    animFrameId = null;
                }
            }
            
            if (animFrameId) cancelAnimationFrame(animFrameId);
            animFrameId = requestAnimationFrame(step);
        }
        
        // 点击开始: 随机选中菜单, 并生成多圈旋转动画（快速旋转+视觉减速）
        function onSpin() {
            // 防止重复点击 & 如果没有菜品则提醒
            if (spinningActive) {
                alert("转盘飞旋中，请稍后再点～ 🌀");
                return;
            }
            if (!menuItems.length) {
                alert("请先粘贴菜单或点击「生成转盘」添加美味佳肴吧！🍱");
                return;
            }
            
            // 随机抽选一个目标索引 (公平随机)
            const randomIndex = Math.floor(Math.random() * segmentsCount);
            // 当前旋转弧度
            const currentRot = currentRotation;
            // 理想基本偏移(使得指针指向目标扇区中央)
            let idealBaseRot = calcRotationForTargetIndex(randomIndex, currentRot);
            // 增加额外整圈数模拟高速旋转视觉 (5～10圈)
            const extraRounds = 6 + Math.floor(Math.random() * 6);  // 6~11圈
            const fullCircle = Math.PI * 2;
            let targetRotation = idealBaseRot + extraRounds * fullCircle;
            // 保证最终总位移看起来比当前多转很多圈 (避免退绕)
            // 但如果理想的 base + 多圈 小于当前旋转? 因为多圈已经远大于一个圆周，肯定大于当前旋转，但仍需保证平滑从 currentRot 过渡到 targetRotation
            // 最简单确保差值方向正确（因为目标总比当前大很多）
            if (targetRotation <= currentRot) {
                targetRotation += fullCircle * 2;
            }
            // 启动动画: 当前旋转弧度 -> 目标旋转弧度, 耗时2000ms缓动减速
            startSpinAnimation(targetRotation, currentRot);
        }
        
        // 重置转盘 + 更新菜单联动 (取消动画, 重置偏移)
        function handleUpdateMenu() {
            if (spinningActive) {
                cancelAnimation();
                spinningActive = false;
                if (animFrameId) cancelAnimationFrame(animFrameId);
                animFrameId = null;
                spinBtn.disabled = false;
            }
            // 从输入框获取并设置菜单
            let rawText = menuTextarea.value;
            let newMenu = parseMenuFromInput(rawText);
            if (newMenu.length === 0) {
                newMenu = [...DEFAULT_MENU];
                menuTextarea.value = DEFAULT_MENU.join(", ");
            }
            menuItems = newMenu;
            segmentsCount = menuItems.length;
            generateColors(segmentsCount);
            currentRotation = 0;
            drawWheel(currentRotation);
        }
        
        // 初始加载与窗口resize 重绘 (保证画布尺寸自适应)
        function resizeAndRedraw() {
            if (!canvas) return;
            // 设置实际canvas分辨率宽度为 CSS 宽度的2倍防止模糊（保持锐利）
            const container = canvas.parentElement;
            const size = Math.min(container.clientWidth, 550);
            canvas.width = size;
            canvas.height = size;
            drawWheel(currentRotation);
        }
        
        // 监听窗口变化重新绘制
        window.addEventListener('resize', () => {
            if (!spinningActive) {
                resizeAndRedraw();
            } else {
                // 动画中不重新调整尺寸避免闪烁，但等动画结束回调会自动重绘且再次resize会自己修正
                setTimeout(() => resizeAndRedraw(), 50);
            }
        });
        
        // 绑定事件
        function bindEvents() {
            spinBtn.addEventListener('click', onSpin);
            updateBtn.addEventListener('click', () => {
                handleUpdateMenu();
            });
            // 输入框失焦自动合并也可以生成（便捷），但不是核心，为了符合需求且不强制自动生成，保留手动生成转盘。但为了防止用户忘记，加入自动提醒。
            menuTextarea.addEventListener('blur', () => {
                // 温柔提醒更新，但不自动覆盖用户意愿，仅当菜单为空时给默认
                if (menuItems.length === 0 && menuTextarea.value.trim() === "") {
                    menuTextarea.value = DEFAULT_MENU.join(", ");
                    handleUpdateMenu();
                }
            });
        }
        
        // 初始化转盘数据
        function init() {
            // 生成默认菜单示例
            menuItems = [...DEFAULT_MENU];
            segmentsCount = menuItems.length;
            menuTextarea.value = DEFAULT_MENU.join(", ");
            generateColors(segmentsCount);
            currentRotation = 0;
            resizeAndRedraw();
            bindEvents();
        }
        
        init();
    })();
</script>
</body>
</html>
